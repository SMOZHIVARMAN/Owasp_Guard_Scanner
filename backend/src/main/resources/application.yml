spring:
  application:
    name: owasp-guard-backend
  flyway:
    baseline-on-migrate: true

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/owasp_guard}
    username: ${DB_USERNAME:owaspguard_user}
    password: ${DB_PASSWORD:OwaspGuard@123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080



springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000 # 24 hours

zap:
  host: 172.17.0.2
  port: 8080
  api-key: owaspguard-zap-key
